<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuentas Claras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
        "@google/genai": "https://esm.sh/@google/genai@0.1.1",
        "framer-motion": "https://esm.sh/framer-motion@11.0.8",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
    </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#f97316', // orange-500
              hover: '#ea580c', // orange-600
              focus: '#fdba74', // orange-300
              foreground: '#ffffff',
            },
            secondary: {
              DEFAULT: '#eab308', // yellow-500
              hover: '#ca8a04', // yellow-600
              foreground: '#ffffff',
            },
            background: '#fffbf0', // warm white/cream
            surface: '#ffffff', // white
            'surface-hover': '#fef3c7', // amber-100
            'surface-border': '#fed7aa', // orange-200
            text: {
              DEFAULT: '#1f2937', // gray-800
              muted: '#6b7280', // gray-500
            },
            success: '#10b981', // emerald-500
            error: '#ef4444', // red-500
            warning: '#f59e0b', // amber-500
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.5s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        },
      },
    }
  </script>

  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-background text-text min-h-screen selection:bg-primary selection:text-white">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
